<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trading Learning Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Trading Learning Dashboard</h1>
        <p>&#26412;&#22320;&#21482;&#35835;&#22797;&#30424;&#24037;&#20316;&#21488;&#65306;&#22797;&#30424;&#12289;&#23454;&#39564;&#12289;&#30693;&#35782;&#24211;&#21644; K &#32447;&#22238;&#25918;&#12290;</p>
      </div>
      <div class="status" id="connectionStatus">&#35835;&#21462;&#20013;</div>
    </header>

    <main class="layout">
      <section class="panel overview">
        <h2>&#24635;&#35272;</h2>
        <div class="metrics" id="metrics"></div>
      </section>

      <section class="panel replay">
        <div class="panel-header replay-header">
          <div>
            <h2>K &#32447;&#22797;&#30424;&#21488;</h2>
            <p class="hint">&#28378;&#36718;&#32553;&#25918;&#65292;&#25302;&#21160;&#27983;&#35272;&#65292;&#31227;&#21160;&#40736;&#26631;&#26597;&#30475;&#21313;&#23383;&#20809;&#26631;&#21644;&#24403;&#21069; OHLC&#12290;</p>
          </div>
        </div>

        <div class="source-grid">
          <div class="source-control">
            <span>&#21382;&#21490;&#25968;&#25454;</span>
            <div class="controls">
              <select id="datasetSelect"></select>
              <button id="loadDataset" type="button">&#36733;&#20837;&#25968;&#25454;</button>
            </div>
          </div>
          <div class="source-control">
            <span>&#31574;&#30053;&#23454;&#39564;</span>
            <div class="controls">
              <select id="experimentSelect"></select>
              <button id="loadReplay" type="button">&#36733;&#20837;&#23454;&#39564;</button>
            </div>
          </div>
        </div>

        <div class="replay-workspace">
          <div class="chart-stack">
            <div id="klineChart" class="chart-panel"></div>
            <div id="volumeChart" class="volume-panel"></div>
            <div class="timeline-row">
              <input id="replayRange" type="range" min="0" max="0" value="0" />
            </div>
          </div>
          <aside class="inspector">
            <div id="ohlcPanel" class="info-box">&#31561;&#24453;&#36733;&#20837; K &#32447;</div>
            <div id="tradeDetail" class="info-box">&#28857;&#20987;&#20080;&#21334;&#28857;&#26597;&#30475;&#20132;&#26131;&#32454;&#33410;</div>
          </aside>
        </div>

        <div class="replay-toolbar">
          <button id="stepBack" type="button">&#21518;&#36864;</button>
          <button id="playPause" type="button">&#25773;&#25918;</button>
          <button id="stepForward" type="button">&#21069;&#36827;</button>
          <button id="nextTrade" type="button">&#19979;&#19968;&#31508;</button>
          <label><input id="toggleMa20" type="checkbox" checked /> MA20</label>
          <label><input id="toggleMa60" type="checkbox" checked /> MA60</label>
        </div>

        <div id="reportMetrics" class="metrics report-metrics"></div>
        <div class="report-grid">
          <div>
            <h2>&#36164;&#37329;&#26354;&#32447;</h2>
            <div id="equityChart" class="equity-panel"></div>
          </div>
          <div>
            <h2>&#20132;&#26131;&#21015;&#34920;</h2>
            <table id="tradeTable" class="trade-table"></table>
          </div>
        </div>

        <div class="review-draft">
          <div class="review-heading">
            <div>
              <h2>&#22238;&#27979;&#22797;&#30424;&#33609;&#31295;</h2>
              <p id="experimentReviewStatus" class="hint">&#36873;&#25321;&#23454;&#39564;&#21518;&#29983;&#25104;&#22797;&#30424;&#38382;&#39064;&#21644;&#23398;&#20064;&#20219;&#21153;</p>
            </div>
          </div>
          <div id="reviewSummary" class="review-summary"></div>
          <div class="review-grid">
            <section class="review-box">
              <h3>&#39118;&#38505;&#26631;&#35760;</h3>
              <div id="reviewRiskFlags" class="review-list"></div>
            </section>
            <section class="review-box">
              <h3>&#37325;&#28857;&#20132;&#26131;</h3>
              <div id="reviewFocusTrades" class="review-list"></div>
            </section>
            <section class="review-box">
              <h3>&#22797;&#30424;&#38382;&#39064;</h3>
              <div id="reviewQuestions" class="review-list"></div>
            </section>
            <section class="review-box">
              <h3>&#23398;&#20064;&#20219;&#21153;</h3>
              <div id="reviewLearningTasks" class="review-list"></div>
            </section>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>&#26368;&#36817;&#22797;&#30424;</h2>
        <div class="list" id="reviewList"></div>
      </section>

      <section class="panel">
        <h2>&#31574;&#30053;&#23454;&#39564;</h2>
        <div class="list" id="experimentList"></div>
      </section>

      <section class="panel knowledge">
        <h2>&#21382;&#21490;&#25968;&#25454;</h2>
        <div class="list" id="datasetList"></div>
      </section>

      <section class="panel knowledge">
        <h2>&#30693;&#35782;&#21345;&#29255;</h2>
        <div class="list" id="knowledgeList"></div>
      </section>
    </main>

    <script src="/static/vendor/lightweight-charts.standalone.production.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
